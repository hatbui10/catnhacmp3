<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audio Cutter Super Fast</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --p: #a855f7; --s: #10b981; --t: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 400px; background: var(--card); padding: 20px; border-radius: 24px; box-sizing: border-box; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .header { text-align: center; color: var(--p); font-weight: bold; margin-bottom: 15px; }
        .file-box { background: rgba(0,0,0,0.3); border: 2px dashed #334155; padding: 15px; border-radius: 16px; margin-bottom: 15px; }
        .player-zone { text-align: center; margin-bottom: 15px; background: #0f172a; padding: 20px; border-radius: 20px; }
        .big-time { font-size: 3rem; font-weight: 800; color: var(--p); margin-bottom: 10px; }
        .play-btn { width: 60px; height: 60px; background: var(--p); border-radius: 50%; border: none; color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4); }
        .settings { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 15px; }
        .row input { width: 70px; background: #0f172a; border: 1px solid #334155; color: #fff; text-align: center; padding: 8px; border-radius: 8px; font-weight: bold; }
        .btn-set { background: #334155; border: none; color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 11px; }
        
        /* Nút Cắt - Làm nổi bật hơn */
        .btn-cut { width: 100%; background: var(--s); color: #064e3b; border: none; padding: 20px; border-radius: 18px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-cut:disabled { background: #475569; color: #94a3b8; opacity: 0.5; cursor: not-allowed; }
        
        #status { text-align: center; font-size: 13px; margin-top: 15px; font-weight: bold; min-height: 1.5em; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">✂️ MÁY CẮT NHẠC TỐC ĐỘ</div>

    <div class="file-box">
        <input type="file" id="audioInput" accept="audio/*">
    </div>

    <div class="player-zone">
        <div class="big-time" id="currentTime">0.0s</div>
        <button class="play-btn" id="playBtn">▶️</button>
        <div id="status">Chưa chọn file</div>
    </div>

    <div class="settings">
        <div class="row">
            <label>BẮT ĐẦU</label>
            <input type="number" id="startTime" value="0" step="0.1">
            <button class="btn-set" onclick="setT('startTime')">LẤY MỐC</button>
        </div>
        <div class="row">
            <label>KẾT THÚC</label>
            <input type="number" id="endTime" value="10" step="0.1">
            <button class="btn-set" onclick="setT('endTime')">LẤY MỐC</button>
        </div>
    </div>

    <button class="btn-cut" id="cutBtn" disabled>CẮT & TẢI VỀ FILE .WAV</button>
</div>

<script>
    const audioInput = document.getElementById('audioInput');
    const playBtn = document.getElementById('playBtn');
    const cutBtn = document.getElementById('cutBtn');
    const status = document.getElementById('status');
    const timeShow = document.getElementById('currentTime');

    let audio = new Audio();
    let audioBuffer = null;
    let audioCtx = null;

    audioInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.style.color = "#fbbf24";
        status.innerText = "⏳ Đang giải mã... (Vui lòng đợi)";
        cutBtn.disabled = true;

        const url = URL.createObjectURL(file);
        audio.src = url;

        try {
            // Khởi tạo AudioContext ngay lập tức
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const ab = await file.arrayBuffer();
            
            // Giải mã dữ liệu
            audioCtx.decodeAudioData(ab, (buffer) => {
                audioBuffer = buffer;
                document.getElementById('endTime').value = audioBuffer.duration.toFixed(1);
                cutBtn.disabled = false;
                status.style.color = "#10b981";
                status.innerText = "✅ ĐÃ SẴN SÀNG!";
            }, (err) => {
                status.innerText = "❌ Lỗi định dạng file!";
            });
        } catch(err) {
            status.innerText = "❌ Không thể xử lý file.";
        }
    };

    playBtn.onclick = () => {
        if (!audio.src) return;
        if (audio.paused) { audio.play(); playBtn.innerText = "⏸️"; }
        else { audio.pause(); playBtn.innerText = "▶️"; }
    };

    audio.ontimeupdate = () => { timeShow.innerText = audio.currentTime.toFixed(1) + "s"; };

    function setT(id) { document.getElementById(id).value = audio.currentTime.toFixed(1); }

    cutBtn.onclick = () => {
        if (!audioBuffer) return;
        status.innerText = "⚡ Đang tạo file...";
        
        const start = parseFloat(document.getElementById('startTime').value);
        const end = parseFloat(document.getElementById('endTime').value);
        const sr = audioBuffer.sampleRate;
        const sIdx = Math.floor(start * sr);
        const eIdx = Math.floor(end * sr);
        
        const newBuf = audioCtx.createBuffer(audioBuffer.numberOfChannels, eIdx - sIdx, sr);
        for (let i = 0; i < audioBuffer.numberOfChannels; i++) {
            newBuf.copyToChannel(audioBuffer.getChannelData(i).subarray(sIdx, eIdx), i);
        }

        const wav = createWav(newBuf);
        const blob = new Blob([wav], {type: 'audio/wav'});
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = "ket_qua.wav";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        
        status.innerText = "🎉 Xong! Đã tải về.";
    };

    function createWav(buf) {
        const n = buf.numberOfChannels, len = buf.length * n * 2 + 44;
        const ab = new ArrayBuffer(len), v = new DataView(ab);
        let p = 0;
        const s16 = (d) => { v.setUint16(p, d, true); p += 2; };
        const s32 = (d) => { v.setUint32(p, d, true); p += 4; };
        s32(0x46464952); s32(len - 8); s32(0x45564157); s32(0x20746d66);
        s32(16); s16(1); s16(n); s32(buf.sampleRate);
        s32(buf.sampleRate * 2 * n); s16(n * 2); s16(16);
        s32(0x61746164); s32(len - p - 4);
        for (let i = 0; i < buf.length; i++) {
            for (let ch = 0; ch < n; ch++) {
                let s = Math.max(-1, Math.min(1, buf.getChannelData(ch)[i]));
                v.setInt16(p, s < 0 ? s * 0x8000 : s * 0x7FFF, true); p += 2;
            }
        }
        return ab;
    }
</script>
</body>
</html>
